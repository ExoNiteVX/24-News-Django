{% load static %}
<div class="modal fade" id="searchModal" tabindex="-1" role="dialog" aria-labelledby="searchModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document">
        <div class="modal-content" style="border-radius: 10px; border: none;">
            <div class="modal-header" style="background: #f5bc04; border-radius: 10px 10px 0 0;">
                <h5 class="modal-title text-white" id="searchModalLabel">
                    <i class="fa fa-search mr-2"></i>Search News
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body p-4">
                <form method="GET" action="{% url 'search' %}">
                    <div class="input-group input-group-lg mb-3">
                        <input type="text" name="q" class="form-control" placeholder="Search for articles, topics, or keywords..." autofocus>
                        <div class="input-group-append">
                            <button class="btn btn-warning" type="submit" style="background: #f5bc04; border-color: #f5bc04;">
                                <i class="fa fa-search"></i>
                            </button>
                        </div>
                    </div>
                </form>
                
                <div class="mt-4">
                    <h6 class="text-muted mb-3">Popular Categories</h6>
                    <div class="d-flex flex-wrap">
                        <a href="{% url 'technology' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Technology</a>
                        <a href="{% url 'politics' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Politics</a>
                        <a href="{% url 'business' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Business</a>
                        <a href="{% url 'science' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Science</a>
                        <a href="{% url 'events' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Events</a>
                        <a href="{% url 'blog' %}" class="btn btn-outline-secondary btn-sm mr-2 mb-2">Blog</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var searchTriggers = document.querySelectorAll('[data-toggle="search-modal"], .fh5co_display_table .fa-search, .search-icon');
        searchTriggers.forEach(function(trigger) {
            trigger.addEventListener('click', function(e) {
                e.preventDefault();
                $('#searchModal').modal('show');
            });
        });
        
        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey && e.key === 'k') || e.key === '/') {
                e.preventDefault();
                $('#searchModal').modal('show');
            }
            if (e.key === 'Escape') {
                $('#searchModal').modal('hide');
            }
        });
    });
</script>
