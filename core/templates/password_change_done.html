{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - 24 News</title>
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo img {
            height: 60px;
        }
        .success-icon {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .btn-auth {
            background: #f5bc04;
            border: none;
            color: white;
            padding: 12px 30px;
            font-weight: bold;
        }
        .btn-auth:hover {
            background: #e5ac00;
            color: white;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <img src="{% static 'images/logo.png' %}" alt="24 News">
            </div>
            
            <div class="success-icon">
                <i class="fa fa-check-circle"></i>
            </div>
            
            <h3 class="mb-3">Password Changed!</h3>
            <p class="text-muted mb-4">Your password has been changed successfully. You can now use your new password to log in.</p>
            
            <a href="{% url 'profile' %}" class="btn btn-auth">Go to Profile</a>
        </div>
    </div>
</body>
</html>
